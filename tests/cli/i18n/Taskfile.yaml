version: "3"

tasks:
  build:
    dir: ../../..
    cmds:
      - go build ./...

  test:
    dir: ../../..
    cmds:
      - go test -count=1 -race ./...

  vet:
    dir: ../../..
    cmds:
      - go vet ./...

  default:
    deps:
      - build
      - test
      - vet

  driver:
    dir: ../../..
    cmds:
      - go run ./tests/cli/i18n
